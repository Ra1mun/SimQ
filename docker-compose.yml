services:
  mongodb:
    image: mongo:7.0
    container_name: simq-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-simq_admin_password}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - simq-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simq-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-5000}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - DatabaseSettings__ConnectionString=mongodb://admin:${MONGO_PASSWORD:-simq_admin_password}@mongodb:27017
      - DatabaseSettings__DatabaseName=${DATABASE_NAME:-SimQDatabase}
      - AllowedOrigins__0=http://localhost:3000
      - AllowedOrigins__1=http://gitea:3000
      - Logging__LogLevel__Default=${LOG_LEVEL:-Information}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - simq-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  simq-network:
    driver: bridge
